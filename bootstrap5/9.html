<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Typography</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h1 class="display-1">Bootstrap Typography</h1>

        <p class="lead">
            This is a lead paragraph used to highlight important content.
        </p>

        <p class="text-muted">
            This text appears muted and less prominent.
        </p>

        <p class="fw-bold">
            This text is displayed in bold.
        </p>

        <p class="fw-light">
            This text is displayed in a lighter font weight.
        </p>

    </div>

</body>
</html>
