<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q10 - Responsive Design</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f8fafc;
    }

    header {
      background: #1d4ed8;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
      background: #dbeafe;
    }

    nav a {
      text-decoration: none;
      color: #1e3a8a;
      font-weight: bold;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 30px;
      align-items: center;
    }

    .hero img {
      width: 100%;
      max-width: 100%;
      border-radius: 12px;
    }

    .content {
      font-size: 1.1rem;
      line-height: 1.8;
      padding: 20px;
      background: white;
      border-radius: 12px;
    }

    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        align-items: center;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .content {
        font-size: 1rem;
      }

      header {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Responsive Community Portal</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Events</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
  </nav>

  <section class="hero">
    <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1200&q=80" alt="Community Event" />
    <div class="content">
      This layout uses flexible units, Grid, and a media query for screens smaller than 768px.
    </div>
  </section>
</body>
</html>
