<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q11 - Debug and Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9fafb;
      margin: 0;
      padding: 30px;
    }

    .panel {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .box {
      background: #dbeafe;
      border: 1px solid #60a5fa;
      padding: 20px;
      margin-top: 16px;
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      .panel {
        padding: 16px;
      }

      .box {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Testing Layout in DevTools</h1>
    <p>
      Use Chrome DevTools device toolbar to test screen sizes, inspect styles, and verify CSS loading.
    </p>
    <div class="box">
      Resize the screen and check how this box behaves on smaller devices.
    </div>
  </div>
</body>
</html>
