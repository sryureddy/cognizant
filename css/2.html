<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q2 - CSS Syntax and Comments</title>
  <style>
    /* General page styles */
    body {
      font-family: Arial, sans-serif;
      background: #eef5ff;
      margin: 0;
      padding: 30px;
    }

    /* Card wrapper */
    .card {
      max-width: 700px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    /* Style for main CTA button */
    .cta-button {
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    /* Button hover state */
    .cta-button:hover {
      background-color: #0056b3;
    }

    /* Description text */
    .description {
      color: #333;
      line-height: 1.7;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Event Registration</h1>
    <p class="description">This stylesheet uses clean indentation and clear comments.</p>
    <button class="cta-button">Register Now</button>
  </div>
</body>
</html>
