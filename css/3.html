<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q3 - Selectors Playground</title>
  <style>
    /* Universal selector reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      padding: 24px;
    }

    /* ID selector */
    #mainHeader {
      background: #1e3a8a;
      color: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Element selector */
    h2 {
      color: #0f172a;
      margin-bottom: 10px;
    }

    /* Class selector */
    .eventCard {
      background: white;
      border: 1px solid #dbeafe;
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    /* Grouping selector */
    h3, p {
      color: #334155;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="mainHeader">
    <h1>Community Event Portal</h1>
  </div>

  <div class="eventCard">
    <h2>Music Night</h2>
    <h3>Highlights</h3>
    <p>Live band, food stalls, and cultural shows.</p>
  </div>

  <div class="eventCard">
    <h2>Art Exhibition</h2>
    <h3>Highlights</h3>
    <p>Local artists displaying paintings and sculptures.</p>
  </div>
</body>
</html>
