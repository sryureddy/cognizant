<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q5 - Typography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 30px;
      color: #1f2937;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
    }

    h1 {
      font-size: 34px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 18px;
    }

    .subtitle {
      font-style: italic;
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #2563eb;
      margin-bottom: 20px;
    }

    .description {
      font-size: 18px;
      line-height: 1.8;
      text-align: justify;
      letter-spacing: 0.3px;
      font-weight: 400;
    }

    .highlight {
      font-weight: 600;
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to the Community Portal</h1>
    <p class="subtitle">Local Events and Updates</p>
    <p class="description">
      Good typography improves readability. <span class="highlight">Fonts, spacing, and alignment</span>
      make content easier to understand.
    </p>
  </div>
</body>
</html>
