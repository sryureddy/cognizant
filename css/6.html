<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q6 - Link and List Styling</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9fafb;
      margin: 0;
      padding: 30px;
    }

    .menu {
      list-style-type: none;
      list-style-position: inside;
      padding: 0;
      margin: 0 0 20px 0;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .menu li {
      margin: 6px 0;
      padding: 8px 12px;
      background: #e2e8f0;
      border-radius: 8px;
    }

    a:link {
      color: #2563eb;
      text-decoration: none;
    }

    a:visited {
      color: #7c3aed;
    }

    a:hover {
      color: #dc2626;
      text-decoration: underline;
    }

    a:active {
      color: #16a34a;
    }

    .box {
      max-width: 700px;
      background: white;
      padding: 24px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Navigation Menu</h1>

    <ul class="menu">
      <li><a href="#">Home</a></li>
      <li><a href="#">Events</a></li>
      <li><a href="#">Gallery</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

    <p>Links change style using pseudo-classes, and bullets are removed from the nav menu.</p>
  </div>
</body>
</html>
