<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q7 - Table Styling</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      margin: 0;
      padding: 30px;
    }

    .table-wrap {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
    }

    th, td {
      border: 1px solid #cbd5e1;
      padding: 12px;
    }

    th {
      background: #1d4ed8;
      color: white;
    }

    tr:nth-child(even) {
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <div class="table-wrap">
    <h1>Event Schedule</h1>
    <table>
      <tr>
        <th>Event</th>
        <th>Date</th>
        <th>Time</th>
      </tr>
      <tr>
        <td>Music Night</td>
        <td>12 June</td>
        <td>6 PM</td>
      </tr>
      <tr>
        <td>Art Expo</td>
        <td>13 June</td>
        <td>10 AM</td>
      </tr>
      <tr>
        <td>Food Fest</td>
        <td>14 June</td>
        <td>5 PM</td>
      </tr>
    </table>
  </div>
</body>
</html>
