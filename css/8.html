<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q8 - Box Model</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eff6ff;
      margin: 0;
      padding: 30px;
    }

    .eventCard {
      background: white;
      border: 2px solid #60a5fa;
      padding: 20px;
      margin: 20px auto;
      max-width: 700px;
      border-radius: 12px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
    }

    input:focus, select:focus {
      outline: 3px solid #93c5fd;
      border-color: #2563eb;
    }

    .hidden-box {
      visibility: hidden;
      background: #fde68a;
      padding: 10px;
      margin-bottom: 10px;
    }

    .none-box {
      display: none;
      background: #fecaca;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="eventCard">
    <h1>Register for Event</h1>

    <label>Name</label>
    <input type="text" placeholder="Enter your name" />

    <label>Event Type</label>
    <select>
      <option>Music Night</option>
      <option>Art Expo</option>
    </select>

    <div class="hidden-box">This text is hidden but space remains.</div>
    <div class="none-box">This text is not displayed at all.</div>
  </div>
</body>
</html>
