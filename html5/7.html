<!DOCTYPE html>
<html>

<body>

    <video width="400"
           controls
           oncanplay="videoReady()">

        <source src="video.mp4"
                type="video/mp4">

    </video>

    <p id="msg"></p>

    <script>

        function videoReady(){

            document.getElementById("msg")
            .innerHTML = "Video ready to play";

        }

        window.onbeforeunload = function(){

            return "Leave page?";

        }

    </script>

</body>
</html>
