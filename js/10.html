<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern JavaScript Features</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        h1{
            color: darkblue;
        }
        .card{
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 0 5px gray;
        }
        input, select, button{
            padding: 8px;
            margin: 5px 0;
        }
        button{
            background: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover{
            background: navy;
        }
    </style>
</head>
<body>

    <h1>Community Events</h1>

    <input type="text" id="nameInput" placeholder="Event name">
    <input type="text" id="categoryInput" placeholder="Category">
    <input type="number" id="seatsInput" placeholder="Seats">
    <button onclick="addEvent()">Add Event</button>

    <br><br>

    <select id="filterCategory" onchange="renderFilteredEvents()">
        <option value="All">All</option>
        <option value="Music">Music</option>
        <option value="Education">Education</option>
        <option value="Sports">Sports</option>
    </select>

    <div id="eventContainer"></div>

    <script>
        // let and const
        const eventContainer = document.getElementById("eventContainer");

        let events = [
            { name: "Music Concert", category: "Music", seats: 10 },
            { name: "Coding Workshop", category: "Education", seats: 8 },
            { name: "Football Match", category: "Sports", seats: 12 }
        ];

        // default parameter
        function createEvent(name = "Untitled Event", category = "General", seats = 0) {
            return { name, category, seats };
        }

        function addEvent() {
            const name = document.getElementById("nameInput").value || "Untitled Event";
            const category = document.getElementById("categoryInput").value || "General";
            const seats = Number(document.getElementById("seatsInput").value) || 0;

            const newEvent = createEvent(name, category, seats);
            events.push(newEvent);

            renderFilteredEvents();

            document.getElementById("nameInput").value = "";
            document.getElementById("categoryInput").value = "";
            document.getElementById("seatsInput").value = "";
        }

        // destructuring to extract event details
        function renderEvents(list = events) {
            eventContainer.innerHTML = "";

            list.forEach(({ name, category, seats }) => {
                eventContainer.innerHTML += `
                    <div class="card">
                        <h3>${name}</h3>
                        <p>Category: ${category}</p>
                        <p>Seats: ${seats}</p>
                    </div>
                `;
            });
        }

        // spread operator to clone before filtering
        function renderFilteredEvents() {
            const selectedCategory = document.getElementById("filterCategory").value;

            const clonedEvents = [...events];

            const filteredEvents = selectedCategory === "All"
                ? clonedEvents
                : clonedEvents.filter(event => event.category === selectedCategory);

            renderEvents(filteredEvents);
        }

        renderFilteredEvents();
    </script>

</body>
</html>
