<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        h1{
            color: darkblue;
        }

        form{
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 5px gray;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 5px;
        }

        button{
            padding: 10px 15px;
            background: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: navy;
        }

        .error{
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .success{
            color: green;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Event Registration</h1>

    <form id="registrationForm">

        <label>Name</label>
        <input type="text" name="username" placeholder="Enter your name">
        <div id="nameError" class="error"></div>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email">
        <div id="emailError" class="error"></div>

        <label>Select Event</label>
        <select name="event">
            <option value="">-- Choose Event --</option>
            <option value="Music Concert">Music Concert</option>
            <option value="Coding Workshop">Coding Workshop</option>
            <option value="Sports Meet">Sports Meet</option>
        </select>
        <div id="eventError" class="error"></div>

        <button type="submit">Register</button>

    </form>

    <div id="successMessage" class="success"></div>

    <script>

        const form =
            document.getElementById("registrationForm");

        form.addEventListener("submit", function(event){

            // Prevent default form behavior
            event.preventDefault();

            // Clear previous errors
            document.getElementById("nameError").innerHTML = "";
            document.getElementById("emailError").innerHTML = "";
            document.getElementById("eventError").innerHTML = "";
            document.getElementById("successMessage").innerHTML = "";

            // Capture inputs using form.elements
            const name =
                form.elements["username"].value.trim();

            const email =
                form.elements["email"].value.trim();

            const selectedEvent =
                form.elements["event"].value;

            let isValid = true;

            // Name validation
            if(name === ""){

                document.getElementById("nameError")
                    .innerHTML = "Name is required";

                isValid = false;

            }

            // Email validation
            if(email === ""){

                document.getElementById("emailError")
                    .innerHTML = "Email is required";

                isValid = false;

            }
            else if(!email.includes("@")){

                document.getElementById("emailError")
                    .innerHTML = "Enter a valid email";

                isValid = false;

            }

            // Event validation
            if(selectedEvent === ""){

                document.getElementById("eventError")
                    .innerHTML = "Please select an event";

                isValid = false;

            }

            // Success message
            if(isValid){

                document.getElementById("successMessage")
                    .innerHTML =
                    `Registration Successful for ${selectedEvent}!`;

                form.reset();

            }

        });

    </script>

</body>
</html>
