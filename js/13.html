<!DOCTYPE html>
<html lang="en">
<head>
    <title>Debugging and Testing</title>

    <style>
        body{
            font-family: Arial;
            padding: 20px;
            background: #f4f4f4;
        }

        .box{
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        button{
            padding: 10px 15px;
            background: darkblue;
            color: white;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="box">

        <h1>Debugging Example</h1>

        <button onclick="submitForm()">
            Submit Form
        </button>

    </div>

    <script>

        function submitForm(){

            // Add breakpoint here
            debugger;

            let payload = {

                name: "Sarayu",

                email: "sarayu@gmail.com",

                event: "Coding Workshop"

            };

            console.log("Form Submission Started");

            console.log("Payload:", payload);

            fetch(
                "https://jsonplaceholder.typicode.com/posts",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify(payload)
                }
            )

            .then(response => response.json())

            .then(data => {

                console.log("Server Response:", data);

                alert("Submission Successful!");

            })

            .catch(error => {

                console.log("Fetch Error:", error);

            });

        }

    </script>

</body>
</html>
