<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
</head>
<body>

    <h1>Community Event Details</h1>

    <p id="eventInfo"></p>
    <p id="seatInfo"></p>

    <button onclick="registerUser()">Register</button>
    <button onclick="cancelRegistration()">Cancel Registration</button>

    <script>

        // Using const for fixed values
        const eventName = "Tech Fest 2026";
        const eventDate = "10 June 2026";

        // Using let for changing value
        let availableSeats = 50;

        // Display event information using template literals
        document.getElementById("eventInfo").innerHTML =
            `Event: ${eventName} <br> Date: ${eventDate}`;

        // Function to display seats
        function updateSeats() {
            document.getElementById("seatInfo").innerHTML =
                `Available Seats: ${availableSeats}`;
        }

        // Increase/decrease seats using ++ and --
        function registerUser() {
            availableSeats--;
            updateSeats();
        }

        function cancelRegistration() {
            availableSeats++;
            updateSeats();
        }

        // Initial display
        updateSeats();

    </script>

</body>
</html>
