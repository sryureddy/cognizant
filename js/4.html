<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Functions Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            padding: 20px;
        }
        h1 {
            color: #1f3c88;
        }
        .box {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.08);
        }
        button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background: #1f3c88;
            color: white;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            background: #162c61;
        }
        input {
            padding: 8px;
            width: 220px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <h1>Community Event System</h1>

    <div class="box">
        <h3>Add Event</h3>
        <input type="text" id="eventName" placeholder="Event name">
        <input type="text" id="eventCategory" placeholder="Category">
        <button onclick="addEvent()">Add Event</button>
    </div>

    <div class="box">
        <h3>Search Events</h3>
        <input type="text" id="searchText" placeholder="Search by name or category">
        <button onclick="searchEvents()">Search</button>
    </div>

    <div class="box">
        <h3>Event List</h3>
        <div id="eventList"></div>
    </div>

    <div class="box">
        <h3>Category Registration Count</h3>
        <div id="categoryCount"></div>
    </div>

    <script>
        const events = [
            { name: "Music Fest", category: "Entertainment", registrations: 0 },
            { name: "Coding Bootcamp", category: "Education", registrations: 0 },
            { name: "Yoga Session", category: "Health", registrations: 0 }
        ];

        function renderEvents(list = events) {
            const container = document.getElementById("eventList");
            container.innerHTML = "";

            list.forEach((event, index) => {
                container.innerHTML += `
                    <div class="box">
                        <strong>${event.name}</strong><br>
                        Category: ${event.category}<br>
                        Registrations: ${event.registrations}<br>
                        <button onclick="registerUser(${index})">Register</button>
                    </div>
                `;
            });

            showCategoryCount();
        }

        function addEvent() {
            const name = document.getElementById("eventName").value;
            const category = document.getElementById("eventCategory").value;

            if (name && category) {
                events.push({ name, category, registrations: 0 });
                renderEvents();
                document.getElementById("eventName").value = "";
                document.getElementById("eventCategory").value = "";
            } else {
                alert("Please enter event name and category");
            }
        }

        function registerUser(index) {
            events[index].registrations++;
            renderEvents();
        }

        function filterEventsByCategory(category, callback) {
            const filtered = events.filter(event =>
                event.category.toLowerCase().includes(category.toLowerCase()) ||
                event.name.toLowerCase().includes(category.toLowerCase())
            );
            callback(filtered);
        }

        function searchEvents() {
            const text = document.getElementById("searchText").value;
            filterEventsByCategory(text, function(result) {
                renderEvents(result);
            });
        }

        function createCategoryTracker(category) {
            let totalRegistrations = 0;

            return function(count) {
                totalRegistrations += count;
                return `Total registrations for ${category}: ${totalRegistrations}`;
            };
        }

        const trackEntertainment = createCategoryTracker("Entertainment");

        function showCategoryCount() {
            const counts = {};
            events.forEach(event => {
                counts[event.category] = (counts[event.category] || 0) + event.registrations;
            });

            let output = "";
            for (let cat in counts) {
                output += `${cat}: ${counts[cat]}<br>`;
            }

            output += `<br>${trackEntertainment(0)}`;
            document.getElementById("categoryCount").innerHTML = output;
        }

        renderEvents();
    </script>

</body>
</html>
