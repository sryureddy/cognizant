<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects and Prototypes</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        h1{
            color: darkblue;
        }

        .card{
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 0 5px gray;
        }

        button{
            padding: 8px 15px;
            background-color: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: navy;
        }
    </style>
</head>
<body>

    <h1>Event Management System</h1>

    <div id="eventContainer"></div>

    <script>

        // Define Event constructor class
        class Event {

            constructor(name, date, seats) {
                this.name = name;
                this.date = date;
                this.seats = seats;
            }

        }

        // Add method to prototype
        Event.prototype.checkAvailability = function() {

            if(this.seats > 0){
                return "Seats Available";
            }
            else{
                return "Event Full";
            }

        };

        // Create objects
        const event1 = new Event(
            "Tech Conference",
            "15 June 2026",
            25
        );

        const event2 = new Event(
            "Music Festival",
            "20 July 2026",
            0
        );

        const events = [event1, event2];

        const container =
            document.getElementById("eventContainer");

        // Display objects using Object.entries()
        events.forEach((event) => {

            let details = "";

            for (let [key, value] of Object.entries(event)) {

                details += `
                    <p>
                        <strong>${key}</strong> : ${value}
                    </p>
                `;

            }

            details += `
                <p>
                    <strong>Status</strong> :
                    ${event.checkAvailability()}
                </p>
            `;

            container.innerHTML += `
                <div class="card">
                    ${details}
                </div>
            `;

        });

    </script>

</body>
</html>
