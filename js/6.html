<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays and Methods</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        h1{
            color: darkblue;
        }

        .card{
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 0 5px gray;
        }

        button{
            padding: 8px 15px;
            margin-top: 10px;
            background: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: navy;
        }

        input{
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h1>Community Events</h1>

    <input type="text" id="eventName" placeholder="Enter Event Name">
    
    <input type="text" id="eventCategory" placeholder="Enter Category">

    <button onclick="addEvent()">Add Event</button>

    <button onclick="showMusicEvents()">
        Show Music Events
    </button>

    <div id="eventContainer"></div>

    <script>

        // Array of events
        let events = [
            {
                name: "Coding Workshop",
                category: "Education"
            },
            {
                name: "Music Night",
                category: "Music"
            },
            {
                name: "Dance Show",
                category: "Music"
            }
        ];

        const container =
            document.getElementById("eventContainer");

        // Display events using map()
        function displayEvents(eventList){

            container.innerHTML = eventList.map(event => `
            
                <div class="card">

                    <h3>
                        Workshop on ${event.name}
                    </h3>

                    <p>
                        Category: ${event.category}
                    </p>

                </div>

            `).join("");

        }

        // Add new event using push()
        function addEvent(){

            const name =
                document.getElementById("eventName").value;

            const category =
                document.getElementById("eventCategory").value;

            if(name && category){

                events.push({
                    name: name,
                    category: category
                });

                displayEvents(events);

                document.getElementById("eventName").value = "";
                document.getElementById("eventCategory").value = "";

            }
            else{

                alert("Please enter all details");

            }

        }

        // Filter only music events using filter()
        function showMusicEvents(){

            const musicEvents = events.filter(event =>
                event.category.toLowerCase() === "music"
            );

            displayEvents(musicEvents);

        }

        // Initial display
        displayEvents(events);

    </script>

</body>
</html>
