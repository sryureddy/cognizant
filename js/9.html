<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async JS - Event Fetching</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        h1{
            color: darkblue;
        }
        .card{
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 0 5px gray;
        }
        button{
            padding: 8px 15px;
            background: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover{
            background: navy;
        }
        #spinner{
            display: none;
            margin: 10px 0;
            font-weight: bold;
            color: darkblue;
        }
    </style>
</head>
<body>

    <h1>Community Events</h1>

    <button onclick="loadEventsThenCatch()">Load Events (.then/.catch)</button>
    <button onclick="loadEventsAsync()">Load Events (async/await)</button>

    <div id="spinner">Loading events...</div>
    <div id="eventContainer"></div>

    <script>
        // Mock API data
        const mockApi = [
            { name: "Music Concert", category: "Music", seats: 12 },
            { name: "Coding Workshop", category: "Education", seats: 8 },
            { name: "Sports Meet", category: "Sports", seats: 5 }
        ];

        const container = document.getElementById("eventContainer");
        const spinner = document.getElementById("spinner");

        function showSpinner(show) {
            spinner.style.display = show ? "block" : "none";
        }

        function displayEvents(events) {
            container.innerHTML = events.map(event => `
                <div class="card">
                    <h3>${event.name}</h3>
                    <p>Category: ${event.category}</p>
                    <p>Seats: ${event.seats}</p>
                </div>
            `).join("");
        }

        // Fetch events from a mock JSON endpoint using Promise
        function fetchEvents() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    const success = true; // change to false to test error handling
                    if (success) {
                        resolve(mockApi);
                    } else {
                        reject("Failed to fetch event data");
                    }
                }, 1500);
            });
        }

        // Using .then() and .catch()
        function loadEventsThenCatch() {
            showSpinner(true);
            fetchEvents()
                .then(data => {
                    displayEvents(data);
                })
                .catch(error => {
                    container.innerHTML = `<p style="color:red;">${error}</p>`;
                })
                .finally(() => {
                    showSpinner(false);
                });
        }

        // Using async/await with loading spinner
        async function loadEventsAsync() {
            showSpinner(true);
            try {
                const data = await fetchEvents();
                displayEvents(data);
            } catch (error) {
                container.innerHTML = `<p style="color:red;">${error}</p>`;
            } finally {
                showSpinner(false);
            }
        }
    </script>

</body>
</html>
